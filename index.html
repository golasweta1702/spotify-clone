
<!DOCTYPE html>
<html>
<head>
    <title>Spotify Navbar</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>

    <img src="spotify_logo.png" class="logo border">

    <div class="home border">
        <i class="fa-solid fa-house"></i>
    </div>

    <div class="search border">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input type="text"
        placeholder="What do you want to play?">

        <i class="fa-solid fa-box"></i>

    </div>

    <button class="install border">
        <i class="fa-regular fa-circle-down"></i>
        Install App
    </button>
    <div class="notification border">
        <i class="fa-regular fa-bell"></i>
    </div>
</nav>
<footer class="footer">

    <div class="footer-top">

        <div class="column">
            <h4>Company</h4>
            <a href="#">About</a>
            <a href="#">Jobs</a>
            <a href="#">For the Record</a>
        </div>

        <div class="column">
            <h4>Communities</h4>
            <a href="#">For Artists</a>
            <a href="#">Developers</a>
            <a href="#">Advertising</a>
            <a href="#">Investors</a>
        </div>

        <div class="column">
            <h4>Useful Links</h4>
            <a href="#">Support</a>
            <a href="#">Free Mobile App</a>
            <a href="#">Top Song Lyrics</a>
            <a href="#">Import Your Music</a>
        </div>

        <div class="column">
            <h4>Spotify Plans</h4>
            <a href="#">Premium Standard</a>
            <a href="#">Premium Platinum</a>
            <a href="#">Premium Student</a>
        </div>

        <div class="social">
            <i class="fa-brands fa-instagram border"></i>
            <i class="fa-brands fa-x-twitter border"></i>
            <i class="fa-brands fa-facebook border"></i>
        </div>

    </div>

    <hr>

    <div class="footer-bottom">
        <span>Legal</span>
        <span>Privacy Policy</span>
        <span>Cookies</span>

        <p>© 2026 Spotify AB</p>
    </div>

</footer>
</body>
</html>
